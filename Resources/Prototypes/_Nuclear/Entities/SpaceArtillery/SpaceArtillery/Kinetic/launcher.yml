# Blue Magnolia
# Based on CHARON

- type: entity
  id: WeaponShuttleKineticBlueMagnolia
  name: M400 Blue Magnolia 
  parent: BallisticArtilleryUnanchorable
  description: "I won't miss!"
  components:
  - type: StaticPrice
    price: 40000
  - type: Sprite
    sprite: _Nuclear/Objects/ShuttleWeapons/magnolia.rsi
    layers:
    - state: magnolia
    scale: 2, 2
  - type: Appearance
  - type: AmmoCounter
  - type: Battery
    maxCharge: 40000
    startingCharge: 40000
  - type: ExaminableBattery
  - type: WirelessNetworkConnection
    range: 500
  - type: Gun
    fireRate: 0.05
    projectileSpeed: 300
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/leviathan_fire.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 350
  - type: SpaceArtillery
    powerChargeRate: 350
    powerUsePassive: 1000
    powerUseActive: 7500
  - type: Actions
  - type: ProjectileBatteryAmmoProvider
    proto: ShipRailgunProjectileBM
    fireCost: 10000 #CorvaxGoob-ShuttleGuns-Rebalance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 1500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 6000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadarBlip
    radarColor: "#CF0E0E"
    scale: 3
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Heavy

